<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>きょうりゅうほえ | Pinda Lab</title>
<meta property="og:title" content="Dino Roar Box">
<meta property="og:url" content="https://pndshch.github.io/dino-roar/">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { background: radial-gradient(ellipse at top, #0a2a1a 0%, #0d1117 70%); color: #e6edf3; font-family: 'Hiragino Maru Gothic ProN', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 32px; user-select: none; }
.lang-switch { position: fixed; top: 12px; right: 12px; display: flex; gap: 2px; background: rgba(22,27,34,0.9); border: 1px solid #30363d; border-radius: 8px; padding: 3px; z-index: 1000; }
.lang-btn { background: transparent; border: none; color: #7d8590; font-size: 11px; font-weight: 600; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-family: system-ui, sans-serif; }
.lang-btn.active { background: #34d399; color: #0d1117; }
.topbar { width: 100%; max-width: 480px; display: flex; justify-content: space-between; color: #6d7680; font-size: 12px; margin-bottom: 12px; }
.topbar a { color: #6d7680; text-decoration: none; }
.brand-title { font-size: 30px; font-weight: 800; text-align: center; background: linear-gradient(135deg, #34d399, #facc15); -webkit-background-clip: text; background-clip: text; color: transparent; }
.brand-sub { color: #8b949e; font-size: 13px; text-align: center; margin-top: 4px; margin-bottom: 16px; }
.now-playing { width: 100%; max-width: 480px; background: #161b22; border: 1px solid #30363d; border-radius: 14px; padding: 16px 18px; margin-bottom: 14px; text-align: center; min-height: 100px; display: flex; flex-direction: column; justify-content: center; }
.np-emoji { font-size: 48px; margin-bottom: 4px; line-height: 1; }
.np-name { font-size: 18px; font-weight: 800; color: #34d399; }
.np-fact { font-size: 12px; color: #8b949e; margin-top: 4px; line-height: 1.5; }
.np-empty { color: #6d7680; font-size: 13px; }
.dino-grid { width: 100%; max-width: 480px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.dino-btn { aspect-ratio: 4 / 3; background: #161b22; border: 2px solid #30363d; border-radius: 14px; cursor: pointer; font-family: inherit; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; transition: transform 0.1s, border-color 0.15s; position: relative; overflow: hidden; }
.dino-btn:active { transform: scale(0.96); border-color: #34d399; }
.dino-btn .em { font-size: 56px; line-height: 1; }
.dino-btn .name { font-size: 13px; font-weight: 700; }
.dino-btn.playing { border-color: #34d399; box-shadow: 0 0 20px rgba(52,211,153,0.4); animation: pulse 0.6s infinite alternate; }
@keyframes pulse { from { box-shadow: 0 0 20px rgba(52,211,153,0.4); } to { box-shadow: 0 0 30px rgba(52,211,153,0.7); } }
.actions { display: flex; gap: 8px; margin-top: 14px; width: 100%; max-width: 480px; }
.btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; color: #fff; }
.btn-shuffle { background: linear-gradient(135deg, #34d399, #10b981); }
.btn-share { background: #1d9bf0; }
.btn:active { transform: scale(0.97); }
.footer { margin-top: 18px; color: #6d7680; font-size: 11px; text-align: center; }
.footer a { color: #6d7680; text-decoration: none; }
</style>
</head>
<body>
<div class="lang-switch">
    <button class="lang-btn" data-lang="ja">JP</button>
    <button class="lang-btn" data-lang="en">EN</button>
</div>
<div class="topbar"><a href="https://pndshch.github.io/" data-i18n="back">← Pinda Lab</a><span data-i18n="title">きょうりゅうほえ</span></div>

<div class="brand-title" data-i18n="title">きょうりゅうほえ</div>
<div class="brand-sub" data-i18n="subtitle">タップして きょうりゅうの こえを ききくらべよう!</div>

<div class="now-playing" id="np"><div class="np-empty" data-i18n="emptyHint">ボタンを タップ してね</div></div>

<div class="dino-grid" id="grid"></div>

<div class="actions">
    <button class="btn btn-shuffle" id="shuffle" data-i18n="random">🎲 ランダム</button>
    <button class="btn btn-share" id="share" data-i18n="share">𝕏 にシェア</button>
</div>

<div class="footer"><p><a href="https://pndshch.github.io/">© Pinda Lab</a> · <a href="https://www.buymeacoffee.com/pndshch" target="_blank">☕</a></p></div>

<script>
'use strict';
const I18N = {
    ja: { title: 'きょうりゅうほえ', subtitle: 'タップして きょうりゅうの こえを ききくらべよう!', back: '← Pinda Lab',
          emptyHint: 'ボタンを タップ してね', random: '🎲 ランダム', share: '𝕏 にシェア',
          shareText: 'きょうりゅうほえ 🦖 8種類のきょうりゅうのほえごえを ききくらべ!',
          dinoNames: { trex: 'ティラノサウルス', bron: 'ブラキオサウルス', velo: 'ヴェロキラプトル', tric: 'トリケラトプス', pter: 'プテラノドン', steg: 'ステゴサウルス', duck: 'パラサウロロフス', baby: 'あかちゃんダイノ' },
          dinoFacts: { trex: '地球史上 さいきょう級の 肉食きょうりゅう!', bron: '長い首と 大きな体の そうしょくきょうりゅう。', velo: 'すばやくて かしこい 小がた肉食きょうりゅう。', tric: '3本の つのを もつ ちからもち。', pter: '大きな つばさで 空をとぶ。', steg: '背中の せばんが かっこいい。', duck: '頭の とさかから 音を出すよ!', baby: 'うまれたばかり!かわいい。' } },
    en: { title: 'Dino Roar Box', subtitle: 'Tap to compare 8 different dinosaur roars!', back: '← Pinda Lab',
          emptyHint: 'Tap a button', random: '🎲 Random', share: 'Share on 𝕏',
          shareText: 'Dino Roar Box 🦖 Compare 8 different dinosaur roars!',
          dinoNames: { trex: 'Tyrannosaurus', bron: 'Brachiosaurus', velo: 'Velociraptor', tric: 'Triceratops', pter: 'Pteranodon', steg: 'Stegosaurus', duck: 'Parasaurolophus', baby: 'Baby Dino' },
          dinoFacts: { trex: 'One of the strongest carnivores ever!', bron: 'Long-necked giant herbivore.', velo: 'Fast and clever small carnivore.', tric: 'Strong with three horns.', pter: 'Soared the skies on huge wings.', steg: 'Famous spiky back plates.', duck: 'Made sounds through its head crest!', baby: 'Just hatched! So cute.' } },
};
let curLang = 'ja';
function applyLang(lang) {
    curLang = lang;
    const dict = I18N[lang] || I18N.ja;
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-i18n]').forEach(el => { const key = el.dataset.i18n; if (typeof dict[key] === 'string') el.textContent = dict[key]; });
    document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
    try { localStorage.setItem('pl-lang', lang); } catch {}
    document.title = dict.title + ' | Pinda Lab';
    // re-render dino names
    DINOS.forEach(d => {
        const btn = grid.querySelector(`[data-id="${d.id}"]`);
        if (btn) btn.querySelector('.name').textContent = dict.dinoNames[d.id];
    });
}
document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => applyLang(btn.dataset.lang)));

const DINOS = [
    { id:'trex', em:'🦖', f0:80, f1:140, dur:1.6, type:'sawtooth', vibrato:8, mod:1.0 },
    { id:'bron', em:'🦕', f0:60, f1:100, dur:2.0, type:'triangle', vibrato:3, mod:0.7 },
    { id:'velo', em:'🐊', f0:300, f1:500, dur:0.8, type:'square', vibrato:14, mod:1.4 },
    { id:'tric', em:'🦏', f0:120, f1:180, dur:1.4, type:'sawtooth', vibrato:5, mod:0.9 },
    { id:'pter', em:'🦅', f0:600, f1:1100, dur:0.9, type:'sine', vibrato:12, mod:1.6 },
    { id:'steg', em:'🐢', f0:90, f1:140, dur:1.5, type:'triangle', vibrato:4, mod:0.8 },
    { id:'duck', em:'🦆', f0:220, f1:340, dur:1.7, type:'sine', vibrato:7, mod:1.0 },
    { id:'baby', em:'🐣', f0:500, f1:900, dur:0.6, type:'sine', vibrato:18, mod:1.8 },
];

const grid = document.getElementById('grid');
DINOS.forEach(d => {
    const b = document.createElement('button');
    b.className = 'dino-btn'; b.dataset.id = d.id;
    b.innerHTML = `<span class="em">${d.em}</span><span class="name">${I18N.ja.dinoNames[d.id]}</span>`;
    b.addEventListener('click', () => roar(d, b));
    grid.appendChild(b);
});

let actx = null, activeBtn = null, activeNodes = [];
function getCtx() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); if (actx.state === 'suspended') actx.resume(); return actx; }
function stopAll() { activeNodes.forEach(n => { try { n.stop(); n.disconnect(); } catch {} }); activeNodes = []; if (activeBtn) activeBtn.classList.remove('playing'); activeBtn = null; }

function roar(d, btn) {
    stopAll();
    const ctx = getCtx();
    const t0 = ctx.currentTime, dur = d.dur;
    const osc = ctx.createOscillator();
    osc.type = d.type;
    osc.frequency.setValueAtTime(d.f0, t0);
    osc.frequency.exponentialRampToValueAtTime(d.f1, t0 + dur * 0.3);
    osc.frequency.exponentialRampToValueAtTime(d.f0 * 0.7, t0 + dur);
    const lfo = ctx.createOscillator(); lfo.frequency.value = d.vibrato;
    const lfoGain = ctx.createGain(); lfoGain.gain.value = d.f0 * 0.15;
    lfo.connect(lfoGain).connect(osc.frequency);
    const sub = ctx.createOscillator(); sub.type = 'sawtooth';
    sub.frequency.setValueAtTime(d.f0 * 0.5, t0);
    sub.frequency.exponentialRampToValueAtTime(d.f1 * 0.5, t0 + dur * 0.3);
    sub.frequency.exponentialRampToValueAtTime(d.f0 * 0.35, t0 + dur);
    const subGain = ctx.createGain(); subGain.gain.value = 0.25 * d.mod;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(0.4, t0 + 0.05);
    gain.gain.linearRampToValueAtTime(0.4, t0 + dur * 0.7);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    const filter = ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 2000 * d.mod; filter.Q.value = 4;
    const dist = ctx.createWaveShaper();
    const curve = new Float32Array(256);
    for (let i = 0; i < 256; i++) { const x = (i / 128) - 1; curve[i] = Math.tanh(x * 3); }
    dist.curve = curve;
    osc.connect(dist); sub.connect(subGain).connect(dist);
    dist.connect(filter).connect(gain).connect(ctx.destination);
    osc.start(t0); osc.stop(t0 + dur);
    sub.start(t0); sub.stop(t0 + dur);
    lfo.start(t0); lfo.stop(t0 + dur);
    activeNodes.push(osc, sub, lfo);
    btn.classList.add('playing'); activeBtn = btn;
    setTimeout(() => { if (activeBtn === btn) { btn.classList.remove('playing'); activeBtn = null; } }, dur * 1000);
    const dict = I18N[curLang] || I18N.ja;
    document.getElementById('np').innerHTML = `<div class="np-emoji">${d.em}</div><div class="np-name">${dict.dinoNames[d.id]}</div><div class="np-fact">${dict.dinoFacts[d.id]}</div>`;
}

document.getElementById('shuffle').addEventListener('click', () => {
    const d = DINOS[Math.floor(Math.random() * DINOS.length)];
    roar(d, grid.querySelector(`[data-id="${d.id}"]`));
});
document.getElementById('share').addEventListener('click', () => {
    const dict = I18N[curLang] || I18N.ja;
    window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(dict.shareText)}&url=${encodeURIComponent('https://pndshch.github.io/dino-roar/')}`, '_blank', 'noopener');
});

let initLang;
try { initLang = localStorage.getItem('pl-lang'); } catch {}
if (!initLang) { const nav = (navigator.language || 'ja').toLowerCase(); initLang = nav.startsWith('ja') ? 'ja' : 'en'; }
applyLang(initLang);
</script>
</body>
</html>
